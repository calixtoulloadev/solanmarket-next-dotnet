services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: solanmarket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-solanmarket}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-solanmarket}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: solanmarket_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?err}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── .NET API ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Solanmarket.API/Dockerfile
    container_name: solanmarket_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:   Production
      ASPNETCORE_URLS:          http://+:5000
      ConnectionStrings__PostgreSQL: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-solanmarket};
        Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD}
      Jwt__Key:       ${JWT_KEY:?err}
      Jwt__Issuer:    ${JWT_ISSUER:-solanmarket-api}
      Jwt__Audience:  ${JWT_AUDIENCE:-solanmarket-client}
      Stripe__SecretKey:       ${STRIPE_SECRET_KEY}
      Cloudinary__CloudName:   ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey:      ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret:   ${CLOUDINARY_API_SECRET}
      SendGrid__ApiKey:        ${SENDGRID_API_KEY}
      Azure__Storage__ConnectionString: ${AZURE_STORAGE_CONNECTION_STRING}
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Next.js web ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:                  http://api:5000/api
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:   ${STRIPE_PUBLISHABLE_KEY}
    container_name: solanmarket_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001/api}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
